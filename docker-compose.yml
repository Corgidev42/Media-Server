#==============================================================================
# Stack Media Server - Configuration Docker Compose
# Architecture: Atomic Moves (/data structure)
# Réseau: media-network (isolé)
# VPN: Gluetun (NordVPN) pour qBittorrent uniquement
#==============================================================================

services:

  #============================================================================
  # Gluetun - Conteneur VPN (NordVPN)
  # Note: Seul qBittorrent passe par ce VPN
  #============================================================================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8090:8090"  # Port qBittorrent Web UI
      - "6881:6881"  # Port qBittorrent TCP
      - "6881:6881/udp"  # Port qBittorrent UDP
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${NORDVPN_SERVICE_USER}
      - OPENVPN_PASSWORD=${NORDVPN_SERVICE_PASSWORD}
      - SERVER_COUNTRIES=France
      - FIREWALL_OUTBOUND_SUBNETS=172.20.0.0/16
      - TZ=${TZ}
    volumes:
      - gluetun_config:/gluetun
    networks:
      - media-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "https://1.1.1.1"]
      interval: 60s
      timeout: 10s
      retries: 3

  #============================================================================
  # qBittorrent - Client Torrent (via VPN Gluetun)
  #============================================================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"  # Tout le trafic passe par Gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8090
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest  # VueTorrent UI (optionnel)
    volumes:
      - qbittorrent_config:/config
      - ${DATA_PATH}/downloads:/data/downloads  # Downloads
    restart: unless-stopped

  #============================================================================
  # Flaresolverr - Contournement Cloudflare
  #============================================================================
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    networks:
      - media-network
    restart: unless-stopped

  #============================================================================
  # Prowlarr - Gestionnaire d'indexeurs
  #============================================================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "9696:9696"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - prowlarr_config:/config
      - ./prowlarr/config.xml:/config/config.xml  # Pre-configured API key + Auth
    networks:
      - media-network
    restart: unless-stopped

  #============================================================================
  # Radarr - Gestionnaire de films
  #============================================================================
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - radarr_config:/config
      - ./radarr/config.xml:/config/config.xml  # Pre-configured API key + Auth
      - ${DATA_PATH}:/data  # Structure atomique
    networks:
      - media-network
    restart: unless-stopped

  #============================================================================
  # Sonarr - Gestionnaire de séries
  #============================================================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - sonarr_config:/config
      - ./sonarr/config.xml:/config/config.xml  # Pre-configured API key + Auth
      - ${DATA_PATH}:/data  # Structure atomique
    networks:
      - media-network
    restart: unless-stopped

  #============================================================================
  # Jellyseerr - Interface de requêtes média
  # Interface: http://localhost:5055
  #============================================================================
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    ports:
      - "5055:5055"
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    volumes:
      - jellyseerr_config:/app/config
    networks:
      - media-network
    restart: unless-stopped

  #============================================================================
  # Jellyfin - Serveur de lecture multimédia
  # Interface: http://localhost:8096
  #============================================================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
      - "7359:7359/udp"   # Client Discovery
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-http://localhost:8096}
    volumes:
      - jellyfin_config:/config
      - ${DATA_PATH}/media:/data/media:ro
    networks:
      - media-network
    restart: unless-stopped

  #============================================================================
  # Jellystat - Statistiques et monitoring Jellyfin
  # Interface: http://localhost:3000
  #============================================================================
  jellystat-db:
    image: postgres:15-alpine
    container_name: jellystat-db
    environment:
      - POSTGRES_DB=jfstat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${JELLYSTAT_DB_PASSWORD:-jellystat}
    volumes:
      - jellystat_db:/var/lib/postgresql/data
    networks:
      - media-network
    restart: unless-stopped

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=jfstat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${JELLYSTAT_DB_PASSWORD:-jellystat}
      - JWT_SECRET=${JELLYSTAT_JWT_SECRET:-change-me}
      - TZ=${TZ}
    networks:
      - media-network
    restart: unless-stopped
    depends_on:
      - jellystat-db

  #============================================================================
  # Recyclarr - Configuration automatique Radarr/Sonarr depuis TRaSH Guides
  # Synchronise les Quality Profiles, Custom Formats, Naming, etc.
  #============================================================================
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - RADARR_URL=${RADARR_URL}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_URL=${SONARR_URL}
      - SONARR_API_KEY=${SONARR_API_KEY}
    volumes:
      - ./recyclarr:/config
      - ./recyclarr/logs:/config/logs
    networks:
      - media-network
    restart: unless-stopped

#==============================================================================
# Volumes Docker (configurations persistantes)
#==============================================================================
volumes:
  gluetun_config:
    name: gluetun_config
  qbittorrent_config:
    name: qbittorrent_config
  prowlarr_config:
    name: prowlarr_config
  radarr_config:
    name: radarr_config
  sonarr_config:
    name: sonarr_config
  jellyseerr_config:
    name: jellyseerr_config
  jellyfin_config:
    name: jellyfin_config
  jellystat_db:
    name: jellystat_db

#==============================================================================
# Réseau isolé
#==============================================================================
networks:
  media-network:
    name: media-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
